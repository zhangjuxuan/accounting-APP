<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小鸡记账</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 纹理覆盖层 -->
  <div class="grain-overlay"></div>

  <!-- ===== 首页 ===== -->
  <div id="page-home" class="page active">
    <header class="page-header">
      <div class="brand-row">
        <svg class="brand-logo" viewBox="0 0 40 40" width="34" height="34" aria-label="xiaoji"><circle cx="19" cy="21" r="14" fill="#FFD54F"/><path d="M16 9c-1.5-3 2-4.5 4.5-2.5" fill="none" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/><circle cx="24" cy="17" r="2.4" fill="#3E2723"/><path d="M31 19l5 1.5-5 1.5z" fill="#FF8A65"/><path d="M11 30c2.5 2.5 6 3.8 9.5 3.5" fill="none" stroke="#FFB300" stroke-width="1.6" stroke-linecap="round"/></svg>
        <h1 class="brand">小鸡记账</h1>
      </div>
      <p class="brand-sub">一粒一粒攒起来</p>
    </header>

    <!-- 月度汇总卡片 -->
    <section class="summary-card">
      <div class="summary-month" id="home-month">2024 年 01 月</div>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">支出</span>
          <span class="summary-value expense" id="home-expense">0.00</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">收入</span>
          <span class="summary-value income" id="home-income">0.00</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">结余</span>
          <span class="summary-value" id="home-balance">0.00</span>
        </div>
      </div>
    </section>

    <!-- 账单列表 -->
    <section class="bill-list" id="home-bill-list"></section>

    <!-- 空状态 -->
    <div class="empty-tip" id="home-empty" style="display:none;">
      <div class="empty-icon">📝</div>
      <p>本月暂无记录</p>
      <p class="empty-sub">点击下方 + 开始记账</p>
    </div>
  </div>

  <!-- ===== 统计页 ===== -->
  <div id="page-stats" class="page">
    <header class="page-header page-header--row">
      <div class="brand-row">
        <span class="brand-logo">📊</span>
        <h1 class="brand">账单统计</h1>
      </div>
      <button class="ai-entry-btn" id="ai-entry-btn">
        <svg viewBox="0 0 40 40" width="20" height="20" aria-label="xiaoji">
          <circle cx="19" cy="21" r="14" fill="#FFD54F"/>
          <path d="M16 9c-1.5-3 2-4.5 4.5-2.5" fill="none" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
          <circle cx="24" cy="17" r="2.4" fill="#3E2723"/>
          <path d="M31 19l5 1.5-5 1.5z" fill="#FF8A65"/>
        </svg>
        <span>AI 助手</span>
      </button>
    </header>

    <!-- 统计月份选择 -->
    <div class="stats-controls">
      <input type="month" id="stats-month" class="month-picker">
      <div class="seg-control" id="stats-seg">
        <button class="seg-btn active" data-type="expense">支出</button>
        <button class="seg-btn" data-type="income">收入</button>
      </div>
    </div>

    <!-- 统计汇总 -->
    <section class="summary-card summary-card--stats">
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">支出</span>
          <span class="summary-value expense" id="stats-expense">0.00</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">收入</span>
          <span class="summary-value income" id="stats-income">0.00</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">结余</span>
          <span class="summary-value" id="stats-balance">0.00</span>
        </div>
      </div>
    </section>

    <!-- 分类饼图 -->
    <section class="chart-section">
      <h3 class="chart-title">分类占比</h3>
      <div id="chart-category" class="chart-box"></div>
    </section>

    <!-- 趋势柱状图 -->
    <section class="chart-section">
      <h3 class="chart-title">近 6 月趋势</h3>
      <div id="chart-trend" class="chart-box"></div>
    </section>

    <!-- 统计空状态 -->
    <div class="empty-tip" id="stats-empty" style="display:none;">
      <div class="empty-icon">📊</div>
      <p>暂无数据</p>
    </div>
  </div>

  <!-- ===== 底部导航栏 ===== -->
  <nav class="tab-bar">
    <div class="tab-item active" data-page="home">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-add" id="btn-add">
      <div class="tab-add-ring">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 5v14m-7-7h14"/>
        </svg>
      </div>
    </div>
    <div class="tab-item" data-page="stats">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      <span class="tab-label">统计</span>
    </div>
  </nav>

  <!-- ===== 记账弹层 ===== -->
  <div id="record-modal" class="modal">
    <div class="record-mask" id="record-mask"></div>
    <div class="modal-content">
      <!-- 弹层头部 -->
      <div class="modal-header">
        <button class="modal-btn" id="record-cancel">取消</button>
        <div class="seg-control seg-control--modal" id="record-seg">
          <button class="seg-btn active" data-rtype="expense">支出</button>
          <button class="seg-btn" data-rtype="income">收入</button>
        </div>
        <button class="modal-btn modal-btn--save" id="record-save">保存</button>
      </div>

      <!-- 分类网格 -->
      <div class="category-grid" id="category-grid"></div>

      <!-- 金额输入区 -->
      <div class="amount-area">
        <div class="amount-cate-wrap">
          <span class="amount-cate cate-editable" id="amount-cate">点击自定义分类</span>
          <input type="text" class="amount-cate-input" id="amount-cate-input" placeholder="输入分类名" style="display:none;">
        </div>
        <div class="amount-display">
          <span class="amount-symbol">¥</span>
          <span class="amount-text" id="amount-text">0</span>
        </div>
      </div>

      <!-- 备注 & 日期 -->
      <div class="record-meta">
        <input type="text" class="meta-input" id="record-remark" placeholder="添加备注...">
        <input type="date" class="meta-input meta-date" id="record-date">
      </div>

      <!-- 数字键盘 -->
      <div class="keypad" id="keypad">
        <button data-key="1">1</button>
        <button data-key="2">2</button>
        <button data-key="3">3</button>
        <button data-key="del">⌫</button>
        <button data-key="4">4</button>
        <button data-key="5">5</button>
        <button data-key="6">6</button>
        <button data-key="clear">C</button>
        <button data-key="7">7</button>
        <button data-key="8">8</button>
        <button data-key="9">9</button>
        <button class="key-ok" data-key="ok">完成</button>
        <button data-key="0">0</button>
        <button data-key="00">00</button>
        <button data-key=".">.</button>
      </div>
    </div>
  </div>

  <!-- ===== AI 助手弹窗 ===== -->
  <div id="ai-modal" class="modal ai-modal">
    <div class="record-mask" id="ai-mask"></div>
    <div class="modal-content ai-modal-content">
      <!-- 弹窗头部 -->
      <div class="ai-modal-header">
        <div class="ai-header">
          <svg class="ai-logo" viewBox="0 0 40 40" width="24" height="24" aria-label="xiaoji">
            <circle cx="19" cy="21" r="14" fill="#FFD54F"/>
            <path d="M16 9c-1.5-3 2-4.5 4.5-2.5" fill="none" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
            <circle cx="24" cy="17" r="2.4" fill="#3E2723"/>
            <path d="M31 19l5 1.5-5 1.5z" fill="#FF8A65"/>
          </svg>
          <h3 class="ai-title">小鸡 AI 助手</h3>
        </div>
        <button class="ai-modal-close" id="ai-close">✕</button>
      </div>

      <!-- 快捷操作 -->
      <div class="ai-actions">
        <button class="ai-action-btn" id="ai-advice-btn">💡 收支建议</button>
        <button class="ai-action-btn" id="ai-health-btn">❤️ 健康度评价</button>
      </div>

      <!-- 问答输入 -->
      <div class="ai-input-row">
        <input type="text" id="ai-question" class="ai-input" placeholder="问问会计知识，如：什么是复利？" maxlength="200">
        <button class="ai-send-btn" id="ai-send-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- 结果展示 -->
      <div class="ai-result" id="ai-result">
        <div class="ai-result-content" id="ai-result-content">
          <span class="ai-placeholder">问问会计知识，或点上方按钮让小鸡分析你的账单 🐤</span>
        </div>
      </div>
    </div>
  </div>

  <!-- App Logic -->
  <script src="app.js"></script>
</body>
</html>
